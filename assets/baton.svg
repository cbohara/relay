<svg xmlns="http://www.w3.org/2000/svg" viewBox="60 45 840 285" width="840" height="285" role="img" aria-label="A robot hand passing a rainbow baton to another robot hand">
  <title>baton — the handoff</title>
  <defs>
    <linearGradient id="rainbow" gradientUnits="userSpaceOnUse" x1="300" y1="0" x2="660" y2="0">
      <stop offset="0"   stop-color="#ff5d5d"/>
      <stop offset="0.2" stop-color="#ffac4b"/>
      <stop offset="0.4" stop-color="#ffe14b"/>
      <stop offset="0.6" stop-color="#5ddf7a"/>
      <stop offset="0.8" stop-color="#4bb8ff"/>
      <stop offset="1"   stop-color="#b06bff"/>
    </linearGradient>
    <linearGradient id="rod" x1="300" y1="152" x2="660" y2="148" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe39a"/>
      <stop offset="1" stop-color="#ff9e3d"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="-150" x2="0" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d4dae3"/>
      <stop offset="1" stop-color="#a3acba"/>
    </linearGradient>

    <!-- a stylized robot hand, fingers pointing up, wrist at the origin -->
    <g id="hand" stroke="#7c8595" stroke-width="3" stroke-linejoin="round">
      <!-- forearm cuff -->
      <rect x="-48" y="-26" width="96" height="54" rx="16" fill="url(#metal)"/>
      <rect x="-48" y="-6" width="96" height="9" fill="#7c8595" stroke="none" opacity="0.45"/>
      <circle cx="0" cy="14" r="6" fill="#5ddf7a" stroke="none"/>
      <!-- palm -->
      <rect x="-48" y="-98" width="96" height="74" rx="22" fill="url(#metal)"/>
      <!-- fingers -->
      <rect x="-43" y="-152" width="20" height="66" rx="10" fill="#c6cdd8"/>
      <rect x="-21" y="-160" width="20" height="74" rx="10" fill="#c6cdd8"/>
      <rect x="1"   y="-158" width="20" height="72" rx="10" fill="#c6cdd8"/>
      <rect x="23"  y="-140" width="20" height="54" rx="10" fill="#c6cdd8"/>
      <!-- thumb -->
      <rect x="40" y="-96" width="46" height="20" rx="10" fill="#c6cdd8" transform="rotate(38 44 -86)"/>
      <!-- knuckle joints (rainbow) -->
      <circle cx="-33" cy="-120" r="4.5" fill="#ff5d5d" stroke="none"/>
      <circle cx="-11" cy="-126" r="4.5" fill="#ffac4b" stroke="none"/>
      <circle cx="11"  cy="-124" r="4.5" fill="#4bb8ff" stroke="none"/>
      <circle cx="33"  cy="-110" r="4.5" fill="#b06bff" stroke="none"/>
    </g>
  </defs>

  <!-- motion trail of the pass -->
  <g fill="none" stroke-linecap="round">
    <path d="M 300 150 C 400 92, 560 92, 660 146" stroke="url(#rainbow)" stroke-width="22" opacity="0.9"/>
    <path d="M 322 166 C 410 120, 555 120, 638 162" stroke="url(#rainbow)" stroke-width="10" opacity="0.45"/>
  </g>

  <!-- left robot hand: holding the baton (fingertips meet the left knob) -->
  <use href="#hand" transform="translate(351,291) rotate(-20)"/>

  <!-- the baton, mid-pass -->
  <g stroke-linecap="round">
    <line x1="300" y1="152" x2="660" y2="148" stroke="#e07a2d" stroke-width="22"/>
    <line x1="300" y1="152" x2="660" y2="148" stroke="url(#rod)" stroke-width="15"/>
    <circle cx="300" cy="152" r="19" fill="#ff5d5d" stroke="#d83a55" stroke-width="2"/>
    <circle cx="660" cy="148" r="19" fill="#7a5bff" stroke="#5a3fd0" stroke-width="2"/>
  </g>

  <!-- right robot hand: reaching to receive (fingertips meet the right knob) -->
  <use href="#hand" transform="translate(609,291) rotate(20) scale(-1,1)"/>

  <!-- sparkles -->
  <g>
    <path transform="translate(150,90) scale(1.2)"  d="M0,-10 C1.2,-3 3,-1.2 10,0 C3,1.2 1.2,3 0,10 C-1.2,3 -3,1.2 -10,0 C-3,-1.2 -1.2,-3 0,-10 Z" fill="#ffd84b"/>
    <path transform="translate(820,100) scale(1.0)" d="M0,-10 C1.2,-3 3,-1.2 10,0 C3,1.2 1.2,3 0,10 C-1.2,3 -3,1.2 -10,0 C-3,-1.2 -1.2,-3 0,-10 Z" fill="#5ddf7a"/>
    <path transform="translate(480,70) scale(0.8)"  d="M0,-10 C1.2,-3 3,-1.2 10,0 C3,1.2 1.2,3 0,10 C-1.2,3 -3,1.2 -10,0 C-3,-1.2 -1.2,-3 0,-10 Z" fill="#4bb8ff"/>
    <path transform="translate(870,210) scale(0.7)" d="M0,-10 C1.2,-3 3,-1.2 10,0 C3,1.2 1.2,3 0,10 C-1.2,3 -3,1.2 -10,0 C-3,-1.2 -1.2,-3 0,-10 Z" fill="#b06bff"/>
    <path transform="translate(90,200) scale(0.7)"  d="M0,-10 C1.2,-3 3,-1.2 10,0 C3,1.2 1.2,3 0,10 C-1.2,3 -3,1.2 -10,0 C-3,-1.2 -1.2,-3 0,-10 Z" fill="#ff5d5d"/>
  </g>
</svg>
